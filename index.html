<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THE BACKROOMS</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
  canvas { display: block; }
  #overlay {
    position: fixed; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: rgba(0,0,0,0.88); z-index: 10; color: #c8a84b;
    text-align: center; gap: 18px;
  }
  #overlay h1 { font-size: clamp(2.5rem,8vw,5rem); letter-spacing: 0.3em; text-transform: uppercase; text-shadow: 0 0 40px #c8a84b88; animation: flicker 3s infinite; }
  #overlay p { font-size: 1rem; color: #a08030; letter-spacing: 0.12em; max-width: 420px; line-height: 1.7; }
  #overlay button { margin-top: 12px; padding: 12px 36px; background: transparent; border: 1px solid #c8a84b; color: #c8a84b; font-family: 'Courier New', monospace; font-size: 1rem; letter-spacing: 0.2em; cursor: pointer; text-transform: uppercase; transition: all 0.2s; }
  #overlay button:hover { background: #c8a84b22; }
  #gameover { position: fixed; inset: 0; display: none; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.92); z-index: 20; color: #cc2200; text-align: center; gap: 20px; }
  #gameover h1 { font-size: clamp(3rem,10vw,6rem); letter-spacing: 0.25em; text-shadow: 0 0 60px #cc220099; animation: flicker 0.8s infinite; }
  #gameover p { color: #882200; font-size: 0.95rem; letter-spacing: 0.15em; }
  #gameover button { margin-top: 8px; padding: 12px 36px; background: transparent; border: 1px solid #cc2200; color: #cc2200; font-family: 'Courier New', monospace; font-size: 1rem; letter-spacing: 0.2em; cursor: pointer; text-transform: uppercase; }
  #gameover button:hover { background: #cc220022; }
  #hud { position: fixed; top: 16px; left: 16px; color: #c8a84b88; font-size: 0.75rem; letter-spacing: 0.1em; pointer-events: none; display: none; }
  #crosshair { position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 16px; height: 16px; pointer-events: none; display: none; }
  #crosshair::before, #crosshair::after { content: ''; position: absolute; background: rgba(200,168,75,0.5); }
  #crosshair::before { width: 100%; height: 1px; top: 50%; left: 0; }
  #crosshair::after { width: 1px; height: 100%; left: 50%; top: 0; }
  #warning { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); color: #cc220099; font-size: 0.8rem; letter-spacing: 0.2em; pointer-events: none; display: none; text-transform: uppercase; animation: pulse 0.5s infinite; }
  @keyframes flicker { 0%,100%{opacity:1}92%{opacity:1}93%{opacity:0.4}95%{opacity:1}97%{opacity:0.2}98%{opacity:1} }
  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.3} }
</style>
</head>

<div id="overlay">
  <h1>The Backrooms</h1>
  <p>Voce saiu da realidade.<br>Voce esta sozinho. Ou talvez nao.</p>
  <button id="startBtn">Entrar (Clique para travar o mouse)</button>
</div>
<div id="gameover">
  <h1>Fim de Jogo</h1>
  <p>Ele te encontrou.</p>
  <button onclick="location.reload()">Tentar Novamente</button>
</div>

// AUDIO
var audioCtx = null;
var ambiOsc1 = null, ambiOsc2 = null, ambiMaster = null;
var scarePlayed = false;

function initAudio() {
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  ambiMaster = audioCtx.createGain();
  ambiMaster.gain.value = 0.15;
  ambiMaster.connect(audioCtx.destination);

  ambiOsc1 = audioCtx.createOscillator();
  ambiOsc1.type = 'sine'; ambiOsc1.frequency.value = 60;
  var g1 = audioCtx.createGain(); g1.gain.value = 0.4;
  ambiOsc1.connect(g1); g1.connect(ambiMaster); ambiOsc1.start();

  ambiOsc2 = audioCtx.createOscillator();
  ambiOsc2.type = 'sine'; ambiOsc2.frequency.value = 120;
  var g2 = audioCtx.createGain(); g2.gain.value = 0.2;
  ambiOsc2.connect(g2); g2.connect(ambiMaster); ambiOsc2.start();

  var bufSize = audioCtx.sampleRate * 2;
  var noiseBuf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
  var nd = noiseBuf.getChannelData(0);
  for (var i = 0; i < bufSize; i++) nd[i] = Math.random() * 2 - 1;
  var ns = audioCtx.createBufferSource(); ns.buffer = noiseBuf; ns.loop = true;
  var nf = audioCtx.createBiquadFilter(); nf.type = 'lowpass'; nf.frequency.value = 400;
  var ng = audioCtx.createGain(); ng.gain.value = 0.05;
  ns.connect(nf); nf.connect(ng); ng.connect(ambiMaster); ns.start();

  scheduleThump();
}

function scheduleThump() {
  setTimeout(function() {
    if (!audioCtx) return;
    var t = audioCtx.currentTime;
    var g = audioCtx.createGain();
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(0.3, t + 0.05);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.6);
    g.connect(audioCtx.destination);
    var o = audioCtx.createOscillator();
    o.type = 'sine'; o.frequency.setValueAtTime(80, t);
    o.frequency.exponentialRampToValueAtTime(30, t + 0.5);
    o.connect(g); o.start(t); o.stop(t + 0.7);
    scheduleThump();
  }, 3000 + Math.random() * 7000);
}

function updateChaseAudio(intensity) {
  if (!ambiOsc1) return;
  ambiOsc1.frequency.value = 60 + intensity * 80;
  ambiOsc2.frequency.value = 120 + intensity * 160;
  ambiMaster.gain.value = 0.15 + intensity * 0.35;
}

function playScareSound() {
  if (!audioCtx) return;
  var t = audioCtx.currentTime;
  var g = audioCtx.createGain();
  g.gain.setValueAtTime(0, t);
  g.gain.linearRampToValueAtTime(0.85, t + 0.02);
  g.gain.exponentialRampToValueAtTime(0.001, t + 1.5);
  g.connect(audioCtx.destination);
  [200,400,800,1600].forEach(function(freq) {
    var o = audioCtx.createOscillator();
    o.type = 'sawtooth'; o.frequency.value = freq + Math.random()*100;
    o.frequency.linearRampToValueAtTime(freq * 0.5, t + 1.5);
    var og = audioCtx.createGain(); og.gain.value = 0.22;
    o.connect(og); og.connect(g); o.start(t); o.stop(t + 1.6);
  });
  var bufSize = audioCtx.sampleRate;
  var buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
  var d = buf.getChannelData(0);
  for (var i = 0; i < bufSize; i++) d[i] = (Math.random()*2-1) * Math.exp(-i/(audioCtx.sampleRate*0.3));
  var nbuf = audioCtx.createBufferSource(); nbuf.buffer = buf;
  var ng = audioCtx.createGain(); ng.gain.value = 0.4;
  nbuf.connect(ng); ng.connect(audioCtx.destination); nbuf.start(t);
}

function playDeathSound() {
  if (!audioCtx) return;
  var t = audioCtx.currentTime;
  var g = audioCtx.createGain();
  g.gain.setValueAtTime(1.0, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 2.5);
  g.connect(audioCtx.destination);
  var o = audioCtx.createOscillator();
  o.type = 'sawtooth'; o.frequency.setValueAtTime(300, t);
  o.frequency.exponentialRampToValueAtTime(30, t + 2.5);
  o.connect(g); o.start(t); o.stop(t + 2.6);
}

// WALL TEXTURE
function makeWallTexture() {
  var size = 256, c = document.createElement('canvas');
  c.width = c.height = size;
  var ctx = c.getContext('2d');
  ctx.fillStyle = '#c8a030'; ctx.fillRect(0,0,size,size);
  ctx.strokeStyle = '#a07820'; ctx.lineWidth = 1.5;
  for (var x = 0; x <= size; x += 32) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,size); ctx.stroke(); }
  for (var y = 0; y <= size; y += 32) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(size,y); ctx.stroke(); }
  for (var i = 0; i < 400; i++) {
    ctx.beginPath(); ctx.arc(Math.random()*size, Math.random()*size, Math.random()*3+0.5, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(80,60,0,' + (Math.random()*0.15+0.03) + ')'; ctx.fill();
  }
  var tex = new THREE.CanvasTexture(c);
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping; tex.repeat.set(2,1);
  return tex;
}

function makeFloorTexture() {
  var size = 256, c = document.createElement('canvas');
  c.width = c.height = size;
  var ctx = c.getContext('2d');
  ctx.fillStyle = '#9a8020'; ctx.fillRect(0,0,size,size);
  ctx.strokeStyle = '#7a6010'; ctx.lineWidth = 2;
  for (var x = 0; x <= size; x += 64) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,size); ctx.stroke(); }
  for (var y = 0; y <= size; y += 64) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(size,y); ctx.stroke(); }
  var tex = new THREE.CanvasTexture(c);
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping; tex.repeat.set(8,8);
  return tex;
}

var wallMat = new THREE.MeshLambertMaterial({ map: makeWallTexture() });
var floorMat = new THREE.MeshLambertMaterial({ map: makeFloorTexture() });
var ceilMat = new THREE.MeshLambertMaterial({ color: 0xb89828 });

// BUILD MAZE
var wallBoxes = [];
(function buildMaze() {
  var floorGeo = new THREE.PlaneGeometry(COLS*CELL, ROWS*CELL);
  var floor = new THREE.Mesh(floorGeo, floorMat);
  floor.rotation.x = -Math.PI/2;
  floor.position.set((COLS*CELL)/2, 0, (ROWS*CELL)/2);
  scene.add(floor);
  var ceil = new THREE.Mesh(floorGeo, ceilMat);
  ceil.rotation.x = Math.PI/2;
  ceil.position.set((COLS*CELL)/2, WALL_H, (ROWS*CELL)/2);
  scene.add(ceil);
  var wallGeo = new THREE.BoxGeometry(CELL, WALL_H, CELL);
  for (var r = 0; r < ROWS; r++) {
    for (var col = 0; col < COLS; col++) {
      if (MAZE[r][col] === 1) {
        var wall = new THREE.Mesh(wallGeo, wallMat);
        wall.position.set(col*CELL+CELL/2, WALL_H/2, r*CELL+CELL/2);
        scene.add(wall);
        wallBoxes.push(new THREE.Box3().setFromObject(wall));
      }
    }
  }
})();

// LIGHTING
var ambient = new THREE.AmbientLight(0xc8a840, 0.28);
scene.add(ambient);
var sceneLights = [];
[[3,2],[7,5],[12,3],[16,8],[5,10],[10,12],[15,15],[3,17],[8,17],[17,17]].forEach(function(pos) {
  var c = pos[0], r = pos[1];
  if (MAZE[r] && MAZE[r][c] === 0) {
    var pl = new THREE.PointLight(0xd4a020, 1.2, 14);
    pl.position.set(c*CELL+CELL/2, WALL_H*0.8, r*CELL+CELL/2);
    scene.add(pl); sceneLights.push(pl);
  }
});
var playerLight = new THREE.PointLight(0xffe0a0, 0.5, 6);
camera.add(playerLight); scene.add(camera);

// MONSTER SPRITE WITH PHOTO
var monster = null;
var monsterImg = new Image();
monsterImg.onload = function() {
  var tex = new THREE.Texture(monsterImg);
  tex.needsUpdate = true;
  var mat = new THREE.SpriteMaterial({ map: tex, transparent: true, depthWrite: false });
  monster = new THREE.Sprite(mat);
  monster.scale.set(2.4, 3.4, 1);
  var candidates = [];
  for (var r = 0; r < ROWS; r++)
    for (var col = 0; col < COLS; col++)
      if (MAZE[r][col] === 0 && (r > 2 || col > 2)) candidates.push([r, col]);
  var pick = candidates[Math.floor(Math.random() * candidates.length)];
  monster.position.set(pick[1]*CELL+CELL/2, WALL_H*0.5, pick[0]*CELL+CELL/2);
  scene.add(monster);
};
monsterImg.src = MONSTER_IMG_SRC;

// CONTROLS
var yaw = 0, pitch = 0, isLocked = false, gameActive = false, isDead = false;

document.addEventListener('pointerlockchange', function() {
  isLocked = document.pointerLockElement === renderer.domElement;
  if (isLocked && gameActive) {
    document.getElementById('hud').style.display = 'block';
    document.getElementById('crosshair').style.display = 'block';
  }
});

document.addEventListener('mousemove', function(e) {
  if (!isLocked || !gameActive || isDead) return;
  yaw -= e.movementX * 0.0018;
  pitch -= e.movementY * 0.0018;
  pitch = Math.max(-Math.PI/3, Math.min(Math.PI/3, pitch));
});

var keys = {};
document.addEventListener('keydown', function(e) { keys[e.code] = true; });
document.addEventListener('keyup',   function(e) { keys[e.code] = false; });

document.getElementById('startBtn').addEventListener('click', function() {
  initAudio();
  renderer.domElement.requestPointerLock();
  document.getElementById('overlay').style.display = 'none';
  gameActive = true;
});

// COLLISION
function collidesWithWalls(pos) {
  var sphere = new THREE.Sphere(pos, 0.45);
  for (var i = 0; i < wallBoxes.length; i++)
    if (wallBoxes[i].intersectsSphere(sphere)) return true;
  return false;
}

// GAME LOOP
var clock = new THREE.Clock();
var tmpPos = new THREE.Vector3();
var flickerTimer = 0;

function animate() {
  requestAnimationFrame(animate);
  var dt = Math.min(clock.getDelta(), 0.05);
  if (!gameActive || isDead) { renderer.render(scene, camera); return; }

  camera.quaternion.setFromEuler(new THREE.Euler(pitch, yaw, 0, 'YXZ'));

  var q = new THREE.Quaternion().setFromEuler(new THREE.Euler(0, yaw, 0));
  var fwd = new THREE.Vector3(0,0,-1).applyQuaternion(q);
  var right = new THREE.Vector3(1,0,0).applyQuaternion(q);
  var moveDir = new THREE.Vector3();
  if (keys['KeyW'] || keys['ArrowUp'])    moveDir.add(fwd);
  if (keys['KeyS'] || keys['ArrowDown'])  moveDir.sub(fwd);
  if (keys['KeyA'] || keys['ArrowLeft'])  moveDir.sub(right);
  if (keys['KeyD'] || keys['ArrowRight']) moveDir.add(right);
  moveDir.y = 0;
  if (moveDir.lengthSq() > 0) moveDir.normalize();

  tmpPos.copy(camera.position).addScaledVector(moveDir, PLAYER_SPD * dt);
  tmpPos.y = camera.position.y;
  var tryX = new THREE.Vector3(tmpPos.x, tmpPos.y, camera.position.z);
  var tryZ = new THREE.Vector3(camera.position.x, tmpPos.y, tmpPos.z);
  if (!collidesWithWalls(tryX)) camera.position.x = tmpPos.x;
  if (!collidesWithWalls(tryZ)) camera.position.z = tmpPos.z;
  camera.position.y = WALL_H * 0.45;

  if (monster) {
    var toPlayer = new THREE.Vector3().subVectors(camera.position, monster.position);
    var dist = toPlayer.length();

    if (dist < CHASE_DIST) {
      var dir = toPlayer.clone(); dir.y = 0; dir.normalize();
      monster.position.addScaledVector(dir, MONSTER_SPD_CHASE * dt);
    } else {
      monster.position.x += Math.sin(clock.getElapsedTime()*0.3) * MONSTER_SPD_IDLE * dt * 0.5;
      monster.position.z += Math.cos(clock.getElapsedTime()*0.2) * MONSTER_SPD_IDLE * dt * 0.5;
    }
    monster.position.y = WALL_H * 0.5;

    if (dist < SCARE_DIST && !scarePlayed) { scarePlayed = true; playScareSound(); }
    if (dist > SCARE_DIST + 4) scarePlayed = false;

    var intensity = dist < CHASE_DIST ? Math.max(0, 1 - dist/CHASE_DIST) : 0;
    updateChaseAudio(intensity);

    var shakeAmt = dist < 8 ? (8 - dist) / 8 * 0.035 : 0;
    camera.position.x += (Math.random()-0.5) * shakeAmt;
    camera.position.y = WALL_H*0.45 + (Math.random()-0.5)*shakeAmt;

    document.getElementById('warning').style.display = dist < 12 ? 'block' : 'none';
    scene.fog.near = dist < 10 ? Math.max(2, FOG_NEAR-(10-dist)*0.15) : FOG_NEAR;
    scene.fog.far  = dist < 10 ? Math.max(10, FOG_FAR-(10-dist)*0.8)  : FOG_FAR;

    if (dist < KILL_DIST) {
      isDead = true; playDeathSound(); document.exitPointerLock();
      document.getElementById('gameover').style.display = 'flex';
      document.getElementById('hud').style.display = 'none';
      document.getElementById('crosshair').style.display = 'none';
      document.getElementById('warning').style.display = 'none';
    }
  }

  flickerTimer += dt;
  if (flickerTimer > 0.08 + Math.random()*0.2) {
    flickerTimer = 0;
    sceneLights.forEach(function(l) { l.intensity = 1.1 + (Math.random()-0.5)*0.4; });
    ambient.intensity = 0.26 + (Math.random()-0.5)*0.06;
  }

  renderer.render(scene, camera);
}

animate();
</script>
</body>
</html>
